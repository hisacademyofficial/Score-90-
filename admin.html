<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS Academy Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: linear-gradient(to bottom,#0B1120,#111827);
}
</style>

</head>

<body class="text-white p-6">

<h1 class="text-3xl font-bold text-yellow-400 mb-6 text-center">
HIS Academy Admin Dashboard 🔥
</h1>

<div class="text-center mb-6">
<p class="text-lg">Total Leads: 
<span id="leadCount" class="text-yellow-400 font-bold">0</span>
</p>
</div>

<div class="overflow-x-auto">
<table class="min-w-full bg-gray-900 rounded-xl overflow-hidden">
<thead class="bg-yellow-500 text-black">
<tr>
<th class="px-4 py-2">Name</th>
<th class="px-4 py-2">Phone</th>
<th class="px-4 py-2">District</th>
<th class="px-4 py-2">Medium</th>
<th class="px-4 py-2">Midterm</th>
<th class="px-4 py-2">Target</th>
<th class="px-4 py-2">Decision</th>
<th class="px-4 py-2">Friends</th>
<th class="px-4 py-2">Reason</th>
<th class="px-4 py-2">Date</th>
</tr>
</thead>
<tbody id="tableBody" class="text-center"></tbody>
</table>
</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApw1BMALxqOlY4hBkGIMlv4qZBKkYM9k0",
  authDomain: "gospark-media.firebaseapp.com",
  projectId: "gospark-media",
  storageBucket: "gospark-media.firebasestorage.app",
  messagingSenderId: "888562657357",
  appId: "1:888562657357:web:7e1e5df099c280c10fd404",
  measurementId: "G-M571410VS2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadData(){
  const querySnapshot = await getDocs(collection(db, "hisAcademyLeads"));
  const tableBody = document.getElementById("tableBody");
  let count = 0;

  querySnapshot.forEach((doc) => {
    count++;
    const data = doc.data();

    const row = `
      <tr class="border-b border-gray-700">
        <td class="px-4 py-2">${data.name || ""}</td>
        <td class="px-4 py-2">${data.phone || ""}</td>
        <td class="px-4 py-2">${data.district || ""}</td>
        <td class="px-4 py-2">${data.medium || ""}</td>
        <td class="px-4 py-2">${data.midterm || ""}</td>
        <td class="px-4 py-2">${data.target || ""}</td>
        <td class="px-4 py-2">${data.decision || ""}</td>
        <td class="px-4 py-2">${(data.friends || []).join("<br>")}</td>
        <td class="px-4 py-2">${data.reason || ""}</td>
        <td class="px-4 py-2">${data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : ""}</td>
      </tr>
    `;

    tableBody.innerHTML += row;
  });

  document.getElementById("leadCount").innerText = count;
}

loadData();

</script>

</body>
</html>
