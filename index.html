<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS Academy 100/100 Mission</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApw1BMALxqOlY4hBkGIMlv4qZBKkYM9k0",
  authDomain: "gospark-media.firebaseapp.com",
  projectId: "gospark-media",
  storageBucket: "gospark-media.firebasestorage.app",
  messagingSenderId: "888562657357",
  appId: "1:888562657357:web:7e1e5df099c280c10fd404",
  measurementId: "G-M571410VS2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async function(data){
  try{
    await addDoc(collection(db, "HIS_Leads"), data);
    console.log("Data Saved");
  }catch(e){
    console.error("Error:", e);
  }
}
</script>

<style>
body{background:linear-gradient(to bottom,#0B1120,#111827);}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);}
.subject{opacity:0;transform:translateY(40px);transition:.6s;}
.subject.show{opacity:1;transform:translateY(0);}
.gold{animation:glow 1.5s infinite;}
@keyframes glow{
0%{box-shadow:0 0 10px #FFD700;}
50%{box-shadow:0 0 30px #FFD700;}
100%{box-shadow:0 0 10px #FFD700;}
}
</style>
</head>

<body class="text-white font-sans">

<!-- PAGE 1 -->
<div id="page1" class="min-h-screen flex flex-col justify-center items-center p-6">

<h1 class="text-3xl text-yellow-400 font-bold mb-4 text-center">
Only Serious 90+ Students Continue
</h1>

<div class="glass p-6 rounded-2xl w-full max-w-md">

<input id="name" type="text" placeholder="Name"
class="w-full p-3 mb-3 bg-gray-800 rounded">

<input id="phone" type="tel" placeholder="Phone Number"
class="w-full p-3 mb-3 bg-gray-800 rounded">

<input id="district" type="text" placeholder="District"
class="w-full p-3 mb-3 bg-gray-800 rounded">

<select id="medium"
class="w-full p-3 mb-3 bg-gray-800 rounded">
<option>Medium</option>
<option>Kannada</option>
<option>English</option>
</select>

<input id="midterm" type="number" placeholder="Midterm %"
class="w-full p-3 mb-3 bg-gray-800 rounded">

<input id="target" type="number" placeholder="Target Final %"
class="w-full p-3 mb-4 bg-gray-800 rounded">

<p class="text-yellow-400 mb-2">Add 6 Friends (Compulsory)</p>

<div id="friends"></div>

<button onclick="goPage2()"
class="w-full mt-4 bg-yellow-400 text-black font-bold py-3 rounded">
Unlock Subjects
</button>

</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="hidden min-h-screen p-6">

<h2 class="text-2xl text-yellow-400 font-bold text-center mb-6">
🔥 100/100 Subjects 🔥
</h2>

<div class="grid grid-cols-2 gap-4 max-w-md mx-auto">

<div class="subject glass p-4 rounded text-center">Kannada FREE</div>
<div class="subject glass p-4 rounded text-center">English FREE</div>
<div class="subject glass p-4 rounded text-center">Hindi FREE</div>
<div class="subject glass p-4 rounded text-center">Social FREE</div>

<div class="subject glass p-4 rounded text-center gold">
Maths ₹149
</div>

<div class="subject glass p-4 rounded text-center gold">
Science ₹149
</div>

</div>

<button onclick="goPage3()"
class="block mx-auto mt-8 bg-yellow-400 text-black px-6 py-3 rounded font-bold">
Continue
</button>

</div>

<!-- PAGE 3 -->
<div id="page3" class="hidden min-h-screen flex flex-col items-center justify-center p-6">

<h3 class="text-yellow-400 text-xl font-bold mb-4">
Watch Full Video 👇
</h3>

<video id="video" autoplay controls class="rounded mb-6 max-w-md">
<source src="your-video.mp4" type="video/mp4">
</video>

<button id="yesBtn"
class="w-full max-w-md bg-gray-600 py-3 rounded mb-3"
disabled>
🔥 YES – I Choose 100/100
</button>

<button onclick="showReason()"
class="w-full max-w-md bg-gray-700 py-3 rounded">
😔 No – I Am Okay With Average
</button>

<textarea id="reason"
class="hidden w-full max-w-md mt-4 p-3 bg-gray-800 rounded"
placeholder="Tell us why..."></textarea>

</div>

<script>

// Generate 6 friend inputs
for(let i=1;i<=6;i++){
 let input=document.createElement("input");
 input.type="tel";
 input.id="friend"+i;
 input.placeholder="Friend "+i+" Number";
 input.className="w-full p-3 mb-2 bg-gray-800 rounded";
 document.getElementById("friends").appendChild(input);
}

function goPage2(){
 document.getElementById("page1").classList.add("hidden");
 document.getElementById("page2").classList.remove("hidden");

 let cards=document.querySelectorAll(".subject");
 cards.forEach((card,index)=>{
   setTimeout(()=>{card.classList.add("show");},index*300);
 });
}

function goPage3(){
 document.getElementById("page2").classList.add("hidden");
 document.getElementById("page3").classList.remove("hidden");
}

let video=document.getElementById("video");
let yesBtn=document.getElementById("yesBtn");

video.onended=function(){
 yesBtn.disabled=false;
 yesBtn.classList.remove("bg-gray-600");
 yesBtn.classList.add("bg-yellow-400","text-black");
};

yesBtn.onclick=function(){
 confetti({particleCount:120,spread:80});
 submitData("YES");
};

function showReason(){
 document.getElementById("reason").classList.remove("hidden");
 submitData("NO");
}

async function submitData(choice){
 let friends=[];
 for(let i=1;i<=6;i++){
   friends.push(document.getElementById("friend"+i).value);
 }

 let data={
   name:document.getElementById("name").value,
   phone:document.getElementById("phone").value,
   district:document.getElementById("district").value,
   medium:document.getElementById("medium").value,
   midterm:document.getElementById("midterm").value,
   target:document.getElementById("target").value,
   friends:friends,
   response:choice,
   reason:document.getElementById("reason").value,
   timestamp:new Date()
 };

 await window.saveData(data);
 alert("Response Saved Successfully 🔥");
}

</script>

</body>
</html>
