<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIS Academy - Step 1</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApw1BMALxqOlY4hBkGIMlv4qZBKkYM9k0",
  authDomain: "gospark-media.firebaseapp.com",
  projectId: "gospark-media",
  storageBucket: "gospark-media.firebasestorage.app",
  messagingSenderId: "888562657357",
  appId: "1:888562657357:web:7e1e5df099c280c10fd404",
  measurementId: "G-M571410VS2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitForm = async function(){

  let friends = [];
  document.querySelectorAll(".friendInput").forEach(i=>{
    friends.push(i.value);
  });

  let data = {
    name: name.value,
    phone: phone.value,
    district: district.value,
    medium: medium.value,
    studentsInClass: studentsCount.value,
    midterm: midterm.value,
    target: target.value,
    friends: friends,
    decision: "Pending",
    reason: "",
    timestamp: new Date()
  };

  const docRef = await addDoc(collection(db,"hisAcademyLeads"),data);

  // Store document ID in localStorage
  localStorage.setItem("leadId", docRef.id);

  window.location.href="page2.html";
}
</script>
</head>

<body class="bg-gray-900 text-white flex justify-center items-center min-h-screen">

<div class="bg-gray-800 p-6 rounded-xl w-full max-w-md">

<input id="name" placeholder="Name" class="w-full p-3 mb-3 bg-gray-700 rounded">
<input id="phone" placeholder="Phone" class="w-full p-3 mb-3 bg-gray-700 rounded">
<input id="district" placeholder="District" class="w-full p-3 mb-3 bg-gray-700 rounded">

<select id="medium" class="w-full p-3 mb-3 bg-gray-700 rounded">
<option>Kannada</option>
<option>English</option>
</select>

<input id="studentsCount" placeholder="Students in class" class="w-full p-3 mb-3 bg-gray-700 rounded">
<input id="midterm" placeholder="Midterm %" class="w-full p-3 mb-3 bg-gray-700 rounded">
<input id="target" placeholder="Target %" class="w-full p-3 mb-3 bg-gray-700 rounded">

<p class="text-yellow-400">Add 6 Friends</p>

<div id="friends"></div>

<button onclick="submitForm()"
class="w-full bg-yellow-400 text-black p-3 mt-4 rounded font-bold">
Continue
</button>

</div>

<script>
for(let i=1;i<=6;i++){
 let input=document.createElement("input");
 input.placeholder="Friend "+i+" Phone";
 input.className="friendInput w-full p-3 mb-2 bg-gray-700 rounded";
 document.getElementById("friends").appendChild(input);
}
</script>

</body>
</html>
